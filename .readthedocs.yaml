version: 2

formats:
  - pdf

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
    nodejs: "22"
  commands:
    - python -m pip install --upgrade pip
    - python -m pip install -e ".[docs]"
    - npm install -g mystmd
    - cd docs && myst build --html
    - cd docs && python -m sphinx -T -b latex -d _build/sphinx/doctrees -D language=fr -D root_doc=pdf_index . _build/sphinx/latex
    - cd docs/_build/sphinx/latex && latexmk -pdf -bibtex- -interaction=nonstopmode -halt-on-error bibliographie.tex
    - mkdir -p "$READTHEDOCS_OUTPUT/html" "$READTHEDOCS_OUTPUT/pdf"
    - cp -r docs/_build/html/. "$READTHEDOCS_OUTPUT/html"
    - cp "docs/_build/sphinx/latex/bibliographie.pdf" "$READTHEDOCS_OUTPUT/html/bibliographie.pdf"
    - cp "docs/_build/sphinx/latex/bibliographie.pdf" "$READTHEDOCS_OUTPUT/pdf/bibliographie.pdf"
    - bash -lc "mkdir -p $HOME/.local/bin && curl -L https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz | tar -xJ && mv typst-*/typst $HOME/.local/bin/typst"
    - bash -lc "export PATH=$HOME/.local/bin:$PATH && cd docs && myst build --pdf"
    - node scripts/patch-myst-docx-renderer.cjs
    - bash -lc "export PATH=$HOME/.local/bin:$PATH && cd docs && myst build --word"
    - bash -lc "export PATH=$HOME/.local/bin:$PATH && cd docs && myst build --html"
    - bash -lc "cd docs && mkdir -p $READTHEDOCS_OUTPUT/html && cp -r _build/html/. $READTHEDOCS_OUTPUT/html"

python:
  install:
    - method: pip
      path: .[docs]

