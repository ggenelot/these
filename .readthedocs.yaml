version: 2

formats:
  - pdf

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
    nodejs: "22"
  commands:
    - python -m pip install --upgrade pip
    - python -m pip install -e ".[docs]"
    - npm install -g mystmd
    - cd docs && myst build --html
    - cd docs && python -m sphinx -T -b latex -d _build/sphinx/doctrees -D language=fr -D root_doc=pdf_index . _build/sphinx/latex
    - cd docs/_build/sphinx/latex && latexmk -pdf -bibtex- -interaction=nonstopmode -halt-on-error bibliographie.tex
    - mkdir -p "$READTHEDOCS_OUTPUT/html" "$READTHEDOCS_OUTPUT/pdf"
    - cp -r docs/_build/html/. "$READTHEDOCS_OUTPUT/html"
    - cp "docs/_build/sphinx/latex/bibliographie.pdf" "$READTHEDOCS_OUTPUT/html/bibliographie.pdf"
    - cp "docs/_build/sphinx/latex/bibliographie.pdf" "$READTHEDOCS_OUTPUT/pdf/bibliographie.pdf"

