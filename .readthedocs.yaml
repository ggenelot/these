version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
    nodejs: "22"
  commands:
    - npm install -g mystmd
    - bash -lc 'cd docs && myst build --html'
    - bash -lc 'cd docs && python -m sphinx -T -M latexpdf . _build/sphinx -D language=fr -D root_doc=pdf_index'
    - bash -lc 'cd docs && mkdir -p "$READTHEDOCS_OUTPUT/html" && cp -r _build/html/. "$READTHEDOCS_OUTPUT/html"'
    - bash -lc 'cd docs && mkdir -p "$READTHEDOCS_OUTPUT/pdf" && PDF_PATH="$(find _build/sphinx/latex -maxdepth 1 -type f -name "*.pdf" | head -n 1)" && [ -n "$PDF_PATH" ] || { echo "PDF Sphinx introuvable"; find _build -type f -name "*.pdf" -print; exit 1; } && cp "$PDF_PATH" "$READTHEDOCS_OUTPUT/pdf/documentation-complete.pdf"'

python:
  install:
    - method: pip
      path: .[docs]

