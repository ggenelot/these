version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
    nodejs: "22"
  commands:
    - npm install -g mystmd
    - bash -lc "mkdir -p $HOME/.local/bin && curl -L https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz | tar -xJ && mv typst-*/typst $HOME/.local/bin/typst"
    - bash -lc "export PATH=$HOME/.local/bin:$PATH && cd docs && myst build index.md --pdf"
    - bash -lc "export PATH=$HOME/.local/bin:$PATH && cd docs && myst build --html"
    - bash -lc "cd docs && mkdir -p $READTHEDOCS_OUTPUT/html && cp -r _build/html/. $READTHEDOCS_OUTPUT/html"
    - bash -lc "cd docs && mkdir -p $READTHEDOCS_OUTPUT/pdf && PDF_PATH=$(find . -type f -name 'documentation-complete.pdf' | head -n 1) && if [ -z \"$PDF_PATH\" ]; then echo 'PDF documentation-complete.pdf introuvable. PDFs générés:' && find . -type f -name '*.pdf' -print && exit 1; fi && cp \"$PDF_PATH\" \"$READTHEDOCS_OUTPUT/pdf/documentation-complete.pdf\""

python:
  install:
    - method: pip
      path: .[docs]

